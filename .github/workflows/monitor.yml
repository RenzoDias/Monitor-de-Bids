name: CFE Monitor — Execução Automática

on:
  schedule:
    # 11:00 e 17:00 UTC = 08:00 e 14:00 BRT (UTC-3)
    - cron: "0 11 * * *"
    - cron: "0 17 * * *"
  workflow_dispatch:
    inputs:
      ini:
        description: "Data inicial (YYYY-MM-DD) — opcional"
        required: false
      fim:
        description: "Data final (YYYY-MM-DD) — opcional"
        required: false
      origem:
        description: "Origens (CFE,ETN,INB,...) — opcional"
        required: false

permissions:
  contents: write
  issues: write

concurrency:
  group: cfe-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Instalar dependências
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Executar CFE Monitor
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          # GITHUB_TOKEN do script é DESLIGADO aqui de propósito —
          # a publicação do HTML é feita via git push abaixo, evitando duplicação.
          GITHUB_TOKEN: ""
          LOG_LEVEL: INFO
        run: |
          mkdir -p logs
          ARGS=""
          if [ -n "${{ github.event.inputs.ini }}" ]; then ARGS="$ARGS --ini ${{ github.event.inputs.ini }}"; fi
          if [ -n "${{ github.event.inputs.fim }}" ]; then ARGS="$ARGS --fim ${{ github.event.inputs.fim }}"; fi
          if [ -n "${{ github.event.inputs.origem }}" ]; then ARGS="$ARGS --origem ${{ github.event.inputs.origem }}"; fi
          set -o pipefail
          python cfe_monitor.py $ARGS 2>&1 | tee "logs/run-$(date -u +%Y%m%d-%H%M%S).log"

      - name: Upload log da execução
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cfe-monitor-log-${{ github.run_id }}
          path: logs/
          retention-days: 30

      - name: Detectar fontes zeradas e abrir issue se persistente
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ ! -f status_fontes.json ]; then
            echo "status_fontes.json não foi gerado — pulando detecção"
            exit 0
          fi
          python <<'PY'
          import json, os, subprocess
          status = json.load(open("status_fontes.json"))
          falhas = status.get("falhas_consecutivas", {})
          alertar = [f for f, n in falhas.items() if n >= 3]
          if not alertar:
              print("Nenhuma fonte com 3+ falhas consecutivas.")
              exit(0)
          titulo = f"[Monitor] Fonte(s) zerada(s): {', '.join(alertar)}"
          corpo = (
              "As seguintes fontes retornaram **0 procedimentos** em 3 ou mais execuções consecutivas:\n\n"
              + "\n".join(f"- `{f}` — {falhas[f]} falhas consecutivas" for f in alertar)
              + "\n\nProvável causa: scraper quebrado por mudança no site de origem. Verifique o log do run."
          )
          # Evita issues duplicadas: só abre se não houver issue aberta com mesmo título
          existe = subprocess.run(
              ["gh","issue","list","--state","open","--search",titulo,"--json","title"],
              capture_output=True, text=True, check=True
          ).stdout
          if titulo in existe:
              print("Issue já existe — não duplicando.")
          else:
              subprocess.run(["gh","issue","create","--title",titulo,"--body",corpo,"--label","scraper-broken"], check=True)
          PY

      - name: Commit dos resultados (Excel + HTML + index.html)
        if: success()
        run: |
          # Pages serve a partir de index.html — mantemos a URL existente
          if [ -f CFE_Dashboard.html ]; then cp CFE_Dashboard.html index.html; fi
          git config user.name  "cfe-monitor-bot"
          git config user.email "cfe-monitor-bot@users.noreply.github.com"
          git add CFE_Monitor_Consolidado.xlsx CFE_Dashboard.html index.html status_fontes.json 2>/dev/null || true
          if git diff --cached --quiet; then
            